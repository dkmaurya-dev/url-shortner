version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: url_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url_redis
    ports:
      - "6379:6379"
  url-shortner:
    build: .
    container_name: url_shortner
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/url_shortener?schema=public
      - REDIS_URL=redis://redis:6379

volumes:
  postgres_data:
